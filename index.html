<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Walk Pixel NFT</title>
<style>
    body {
        margin: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
    }

    canvas {
        box-shadow: 0 0 40px rgba(255,255,255,0.1);
        image-rendering: pixelated;
    }

    .overlay {
        position: fixed;
        bottom: 10px;
        left: 10px;
        color: #aaa;
        font-size: 12px;
        opacity: 0.6;
    }
</style>
</head>
<body>

<canvas id="art" width="1920" height="1080"></canvas>

<div class="overlay">
    Random Walk Pixel Generator
</div>

<script>
const canvas = document.getElementById('art');
const ctx = canvas.getContext('2d');

// Start position (top-left as requested)
let x = 0;
let y = 0;

// Speed control
let pixelsPerFrame = 10000;

// Random colour
function randomColor() {
    return `rgb(
        ${Math.floor(Math.random() * 256)},
        ${Math.floor(Math.random() * 256)},
        ${Math.floor(Math.random() * 256)}
    )`;
}

// Random direction step
function movePixel() {
    const dir = Math.floor(Math.random() * 4);

    switch (dir) {
        case 0: x++; break; // right
        case 1: x--; break; // left
        case 2: y++; break; // down
        case 3: y--; break; // up
    }

    // Clamp to canvas bounds
    x = Math.max(0, Math.min(canvas.width - 1, x));
    y = Math.max(0, Math.min(canvas.height - 1, y));
}

// Draw loop
function draw() {
    for (let i = 0; i < pixelsPerFrame; i++) {

        ctx.fillStyle = randomColor();
        ctx.fillRect(x, y, 1, 1);

        movePixel();
    }

    requestAnimationFrame(draw);
}

// Start
draw();

</script>

</body>
</html>
